# Render Blueprint — Clinical Clarity
#
# DEFERRED in Phase 6: this file is the planned deploy shape but is NOT yet
# applied. To go live, the operator opens the Render dashboard, points at
# this repo, sets the secret env vars below, and clicks "Apply".
#
# Architecture mirrors docker-compose.yml:
#   - Postgres (managed)               → backend DATABASE_URL + DATABASE_URL_ADMIN
#   - Redis (managed)                  → backend REDIS_URL + worker REDIS_URL
#   - Backend (FastAPI on uvicorn)     → web service
#   - Worker (arq, runs SoA parse jobs)→ background worker (same image as backend)
#   - Frontend (static React build)    → static site served from frontend/dist
#
# S3-equivalent storage uses a separate provider (AWS S3 or R2) — Render does
# not host an S3 today. Set S3_* vars on the backend + worker.

databases:
  - name: vfp-postgres
    plan: starter
    databaseName: clinical_clarity
    user: app_owner

services:
  - type: redis
    name: vfp-redis
    plan: starter
    ipAllowList: []  # private network only

  - type: web
    name: vfp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: vfp-postgres
          property: connectionString
      - key: DATABASE_URL_ADMIN
        fromDatabase:
          name: vfp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vfp-redis
          property: connectionString
      # Secrets — set in the Render dashboard before first deploy.
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        value: '["https://vfp-frontend.onrender.com"]'

  - type: worker
    name: vfp-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: starter
    dockerCommand: arq app.worker.WorkerSettings
    envVars:
      - key: ENVIRONMENT
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: vfp-postgres
          property: connectionString
      - key: DATABASE_URL_ADMIN
        fromDatabase:
          name: vfp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vfp-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false

  - type: web
    name: vfp-frontend
    runtime: static
    buildCommand: cd frontend && pnpm install --frozen-lockfile && pnpm build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_BASE
        value: https://vfp-backend.onrender.com
    routes:
      - type: rewrite
        source: /api/*
        destination: https://vfp-backend.onrender.com/*
      - type: rewrite
        source: /*
        destination: /index.html
