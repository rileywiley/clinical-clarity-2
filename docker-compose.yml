# Dev stack — Phases 0–5.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clinical_clarity
    ports:
      # Host port 55432 to avoid colliding with Homebrew Postgres or other dev
      # projects on 5432-5434. Container-to-container traffic still uses 5432 on the
      # internal docker network.
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clinical_clarity"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      # Host port 56379 to avoid clashing with other dev Redis containers.
      # Container-internal still 6379 (services on the docker network use that).
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # S3-compatible local object store for documents (PRD §10.2 / Phase 5).
  # Production uses real AWS S3; this gives us identical API surface for dev
  # without cloud credentials.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vfp_dev_access
      MINIO_ROOT_PASSWORD: vfp_dev_secret
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Web console (http://localhost:9001)
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot bucket creator. Runs to completion on each `up`, idempotent.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 vfp_dev_access vfp_dev_secret &&
      mc mb --ignore-existing local/vfp-documents &&
      echo 'bucket ready'
      "

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_user_pw@db:5432/clinical_clarity
      DATABASE_URL_ADMIN: postgresql+asyncpg://app_owner:app_owner_pw@db:5432/clinical_clarity
      SESSION_SECRET: dev-only-change-me-please
      CORS_ALLOW_ORIGINS: '["http://localhost:5173"]'
      ENVIRONMENT: dev
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: vfp-documents
      S3_ACCESS_KEY_ID: vfp_dev_access
      S3_SECRET_ACCESS_KEY: vfp_dev_secret
      # Interpolated from the repo-root .env (Compose reads it automatically).
      # Empty string if unset, so the stack still boots without a key — only
      # SoA parsing needs it. The worker service mirrors this.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Mount the local engine package so engine edits hot-reload too (the image
      # bakes it at /engine; uvicorn watches /engine via --reload-dir in the CMD).
      - ./engine:/engine:ro

  # arq worker — runs background jobs (Phase 5: SoA parsing via Claude).
  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:app_user_pw@db:5432/clinical_clarity
      DATABASE_URL_ADMIN: postgresql+asyncpg://app_owner:app_owner_pw@db:5432/clinical_clarity
      SESSION_SECRET: dev-only-change-me-please
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: vfp-documents
      S3_ACCESS_KEY_ID: vfp_dev_access
      S3_SECRET_ACCESS_KEY: vfp_dev_secret
      # SoA parsing runs here (arq parse_soa job) — it's the service that
      # actually calls the Claude API, so it must carry the key. Interpolated
      # from the repo-root .env.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["arq", "app.worker.WorkerSettings"]
    volumes:
      - ./backend:/app
      # Same engine mount as backend. arq has no live reload, so engine (or
      # worker) edits need a `docker-compose restart worker` — but no rebuild.
      - ./engine:/engine:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      # The Vite dev-server proxy forwards /api/* to the backend. Inside this
      # container `localhost` is the frontend itself, so target the backend
      # service over the compose network instead of the host default.
      VITE_API_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres-data:
  minio-data:
